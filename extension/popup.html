<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Steps Recorder</title>
  <link rel="stylesheet" href="design-tokens.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1 class="title">AI Steps Recorder</h1>

    <section class="card">
      <h2>Mode</h2>
      <div class="mode-options">
        <label class="mode-option">
          <input type="radio" name="recordMode" value="step-by-step" checked>
          <span class="mode-label">
            <strong>Step-by-Step</strong>
            <small>Real-time generation</small>
          </span>
        </label>
        <label class="mode-option">
          <input type="radio" name="recordMode" value="one-time">
          <span class="mode-label">
            <strong>One-time</strong>
            <small>Batch at end</small>
          </span>
        </label>
      </div>
    </section>

    <section class="card">
      <h2>Output</h2>
      <div class="format-options">
        <label class="format-option">
          <input type="radio" name="outputFormat" value="javascript" checked>
          <span>JavaScript</span>
        </label>
        <label class="format-option">
          <input type="radio" name="outputFormat" value="python">
          <span>Python</span>
        </label>
        <label class="format-option">
          <input type="radio" name="outputFormat" value="pytest">
          <span>Pytest</span>
        </label>
      </div>
    </section>

    <div class="meta-row">
      <div class="llm-info">
        <span class="llm-provider" id="currentProvider">Loading...</span>
        <span class="llm-sep">·</span>
        <span class="llm-model" id="currentModel"></span>
      </div>
      <div class="status" id="status">
        <span class="status-indicator"></span>
        <span class="status-text">Ready</span>
      </div>
    </div>

    <div class="actions">
      <button id="startRecording" class="btn btn-primary">Start Recording</button>
      <button id="viewHistory" class="btn btn-secondary">History</button>
      <button id="openSettings" class="btn btn-settings">Settings</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
